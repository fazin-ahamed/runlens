# cargo-deny configuration

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
exclude_dev = true

[advisories]
vulnerability = "deny"
unmaintained = "deny"
unsound = "deny"
yanked = "warn"
severity_threshold = "high"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "MIT OR Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-3.0",
]
default = "deny"
unlicensed = "deny"
confidence_threshold = 0.8

[bans]
multiple-versions = "deny"
wildcard = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

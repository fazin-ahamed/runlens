<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: #1e1e1e; color: #d4d4d4; overflow: hidden; }
    #tabs { display: flex; border-bottom: 1px solid #333; background: #252526; }
    .tab { padding: 8px 16px; cursor: pointer; border: none; background: transparent; color: #999; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom: 2px solid #569cd6; }
    .panel { display: none; height: calc(100vh - 36px); overflow-y: auto; padding: 8px; }
    .panel.active { display: block; }
    .entry { padding: 4px 8px; border-bottom: 1px solid #2d2d2d; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; cursor: pointer; }
    .entry:hover { background: #2a2d2e; }
    .entry .level { display: inline-block; width: 48px; text-transform: uppercase; font-size: 10px; font-weight: 600; }
    .level-error { color: #f44747; }
    .level-warn { color: #cca700; }
    .level-info { color: #569cd6; }
    .level-log { color: #d4d4d4; }
    .level-debug { color: #888; }
    .entry .time { color: #6a9955; margin-right: 8px; }
    .entry .msg { color: #d4d4d4; }
    .entry .detail { display: none; margin-top: 4px; padding: 8px; background: #1a1a1a; border-radius: 4px; color: #aaa; font-size: 11px; white-space: pre-wrap; }
    .entry.expanded .detail { display: block; }
    .network-method { display: inline-block; width: 48px; font-weight: 600; }
    .method-GET { color: #569cd6; }
    .method-POST { color: #6a9955; }
    .method-PUT { color: #cca700; }
    .method-DELETE { color: #f44747; }
    .network-status { margin-left: 8px; }
    .status-2xx { color: #6a9955; }
    .status-4xx { color: #cca700; }
    .status-5xx { color: #f44747; }
    .network-duration { margin-left: 8px; color: #888; }
    .entry .count { margin-left: 8px; color: #888; font-size: 11px; }
    #connection-bar { display: flex; align-items: center; gap: 8px; padding: 4px 8px; background: #252526; border-bottom: 1px solid #333; font-size: 11px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.connected { background: #4ec9b0; }
    .dot.disconnected { background: #f44747; }
    .dot.connecting { background: #cca700; }
  </style>
</head>
<body>
  <div id="connection-bar"><span class="dot disconnected" id="status-dot"></span><span id="status-text">Disconnected</span></div>
  <div id="tabs">
    <button class="tab active" data-panel="console">Console</button>
    <button class="tab" data-panel="network">Network</button>
    <button class="tab" data-panel="errors">Errors</button>
  </div>
  <div id="panel-console" class="panel active"></div>
  <div id="panel-network" class="panel"></div>
  <div id="panel-errors" class="panel"></div>
  <script src="devtools.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: #1e1e1e; color: #d4d4d4; padding: 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot.connected { background: #4ec9b0; }
    .dot.disconnected { background: #f44747; }
    .dot.connecting { background: #cca700; }
    .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { color: #d4d4d4; font-family: 'Consolas', monospace; font-size: 12px; }
    button { width: 100%; padding: 8px; background: #0e639c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    button:hover { background: #1177bb; }
    button.danger { background: #5a1d1d; }
    button.danger:hover { background: #7a2a2a; }
    .links { margin-top: 12px; display: flex; gap: 8px; }
    .links a { color: #569cd6; text-decoration: none; font-size: 11px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="row">
    <span><span class="dot disconnected" id="status-dot"></span><span id="status-text">Disconnected</span></span>
    <span class="value" id="session-id">—</span>
  </div>
  <div class="row">
    <span class="label">Events recorded</span>
    <span class="value" id="event-count">0</span>
  </div>
  <button id="toggle-recording">Start Session</button>
  <div class="links">
    <a id="open-devtools">Open DevTools</a>
    <a id="open-settings">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
